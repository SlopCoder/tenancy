<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenancy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #0f0e13;
    --paper-deep: #18171f;
    --paper-elev: #1f1d27;
    --ink: #d8d2c0;
    --ink-soft: #9a9384;
    --ink-faded: #5e5a52;
    --rule: #2b2832;
    --mauve: #a99cc8;
    --mauve-soft: #6e6685;
    --shadow: rgba(0, 0, 0, 0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', 'EB Garamond', Georgia, serif;
    font-size: 20px;
    line-height: 1.65;
    min-height: 100vh;
    /* Faint film grain — barely perceptible noise on the dark background */
    background-image:
      radial-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
      radial-gradient(rgba(255, 255, 255, 0.008) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
  }

  /* Reduced motion respect */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  .stage {
    max-width: 640px;
    margin: 0 auto;
    padding: 80px 32px 160px;
    position: relative;
  }

  .room-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 28px;
    display: inline-block;
    padding: 4px 0;
    border-bottom: 1px solid var(--rule);
    opacity: 0;
    animation: fadeIn 600ms ease forwards;
  }

  .room-label .act {
    color: var(--mauve);
    margin-right: 12px;
  }

  .prose p {
    margin-bottom: 1.25em;
    opacity: 0;
    transform: translateY(4px);
    animation: fadeIn 900ms ease forwards;
  }

  .prose p:nth-child(1) { animation-delay: 200ms; }
  .prose p:nth-child(2) { animation-delay: 700ms; }
  .prose p:nth-child(3) { animation-delay: 1200ms; }
  .prose p:nth-child(4) { animation-delay: 1700ms; }
  .prose p:nth-child(5) { animation-delay: 2200ms; }
  .prose p:nth-child(6) { animation-delay: 2700ms; }
  .prose p:nth-child(7) { animation-delay: 3200ms; }

  .prose em {
    font-style: italic;
    color: var(--ink-soft);
  }

  /* Words the protagonist would not naturally use */
  .prose .drift {
    color: var(--mauve);
    font-style: italic;
  }

  .choices {
    margin-top: 48px;
    padding-top: 28px;
    border-top: 1px solid var(--rule);
    opacity: 0;
    animation: fadeIn 1200ms ease forwards;
    animation-delay: 2800ms;
  }

  .choice {
    display: block;
    width: 100%;
    background: none;
    border: none;
    text-align: left;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    padding: 14px 0 14px 24px;
    cursor: pointer;
    position: relative;
    line-height: 1.6;
    transition: color 200ms ease, padding-left 200ms ease;
    border-bottom: 1px dotted transparent;
  }

  .choice:hover, .choice:focus-visible {
    color: var(--mauve);
    padding-left: 32px;
    outline: none;
  }

  .choice:focus-visible {
    border-bottom-color: var(--mauve);
  }

  .choice::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--ink-faded);
    transition: color 200ms ease;
  }

  .choice:hover::before, .choice:focus-visible::before {
    color: var(--mauve);
  }

  /* Notebook */
  .notebook-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 200ms ease;
    z-index: 10;
  }

  .notebook-toggle:hover, .notebook-toggle:focus-visible {
    color: var(--ink);
    border-color: var(--ink-soft);
    outline: none;
  }

  /* Audio toggle — bottom-right corner, separate from notebook */
  .audio-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 200ms ease;
    z-index: 10;
  }
  .audio-toggle:hover, .audio-toggle:focus-visible {
    color: var(--ink);
    border-color: var(--ink-soft);
    outline: none;
  }
  .audio-toggle .sym {
    display: inline-block;
    margin-right: 6px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    line-height: 1;
    transform: translateY(1px);
  }
  @media (max-width: 600px) {
    .audio-toggle { bottom: 16px; right: 16px; padding: 6px 12px; }
  }

  /* Inventory — top-left, mirrors notebook visually */
  .inv-toggle {
    position: fixed;
    top: 24px;
    left: 24px;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 200ms ease;
    z-index: 10;
  }
  .inv-toggle:hover, .inv-toggle:focus-visible {
    color: var(--ink);
    border-color: var(--ink-soft);
    outline: none;
  }
  .inv-toggle .count {
    display: inline-block;
    margin-left: 8px;
    color: var(--mauve);
    font-weight: 500;
  }
  .inv-toggle .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--mauve);
    margin-left: 8px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 400ms ease;
  }
  .inv-toggle.has-new .dot {
    opacity: 1;
    animation: breathe 3.6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }
  .inv-panel {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 380px;
    max-width: 90vw;
    background: var(--paper-deep);
    border-right: 1px solid var(--rule);
    box-shadow: 8px 0 24px var(--shadow);
    transform: translateX(-100%);
    transition: transform 400ms ease;
    z-index: 20;
    overflow-y: auto;
    padding: 32px 28px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-soft);
  }
  .inv-panel.open {
    transform: translateX(0);
  }
  .inv-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .inv-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
  }
  .inv-close {
    background: none;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faded);
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .inv-item {
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px dotted var(--rule);
    position: relative;
    animation: itemAppear 600ms cubic-bezier(0.2, 0.8, 0.3, 1);
  }
  .inv-item:last-child {
    border-bottom: none;
  }
  .inv-item.is-new::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 0;
    bottom: 18px;
    width: 2px;
    background: var(--mauve);
    opacity: 0.7;
    border-radius: 2px;
  }
  .inv-item.is-new .inv-item-name {
    color: var(--mauve);
  }
  .inv-item-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faded);
    display: block;
    margin-bottom: 6px;
    transition: color 400ms ease;
  }
  .inv-item-desc {
    color: var(--ink);
  }
  .inv-empty {
    color: var(--ink-faded);
    font-style: italic;
  }

  @keyframes itemAppear {
    0% { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 600px) {
    .inv-toggle { top: 16px; left: 16px; padding: 8px 12px; }
  }

  .notebook-toggle .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--mauve);
    margin-left: 8px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 300ms ease;
  }

  .notebook-toggle.has-new .dot {
    opacity: 1;
    animation: breathe 3.6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  @keyframes breathe {
    0%, 100% {
      opacity: 0.55;
      transform: scale(1);
      box-shadow: 0 0 0 0 rgba(169, 156, 200, 0);
    }
    50% {
      opacity: 1;
      transform: scale(1.12);
      box-shadow: 0 0 8px 1px rgba(169, 156, 200, 0.45);
    }
  }

  /* Legacy pulse — kept only in case any element still references it. */
  @keyframes pulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }

  /* New-item / new-note indicator — a slow soft mauve glow that
     rises gently and fades, no scaling, no flash. The accent on the
     button (count or dot) stays mauve until viewed. */
  @keyframes foundFlash {
    0% {
      box-shadow: 0 0 0 0 rgba(169, 156, 200, 0);
      border-color: var(--rule);
    }
    15% {
      box-shadow: 0 0 16px 1px rgba(169, 156, 200, 0.55);
      border-color: var(--mauve);
    }
    100% {
      box-shadow: 0 0 0 0 rgba(169, 156, 200, 0);
      border-color: var(--rule);
    }
  }
  .inv-toggle.flash, .notebook-toggle.flash {
    animation: foundFlash 2400ms ease-out;
  }

  .notebook-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 380px;
    max-width: 90vw;
    background: var(--paper-deep);
    border-left: 1px solid var(--rule);
    box-shadow: -8px 0 24px var(--shadow);
    transform: translateX(100%);
    transition: transform 400ms ease;
    z-index: 20;
    overflow-y: auto;
    padding: 32px 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.75;
    color: var(--ink-soft);
  }

  .notebook-panel.open {
    transform: translateX(0);
  }

  .notebook-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }

  .notebook-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
  }

  .notebook-close {
    background: none;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faded);
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .notebook-entry {
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px dotted var(--rule);
    position: relative;
    animation: itemAppear 600ms cubic-bezier(0.2, 0.8, 0.3, 1);
  }

  .notebook-entry:last-child {
    border-bottom: none;
  }

  .notebook-entry.is-new::before {
    content: '';
    position: absolute;
    right: -16px;
    top: 0;
    bottom: 18px;
    width: 2px;
    background: var(--mauve);
    opacity: 0.7;
    border-radius: 2px;
  }

  .notebook-entry.is-new .entry-time {
    color: var(--mauve);
  }

  .entry-time {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faded);
    display: block;
    margin-bottom: 6px;
  }

  .entry-body {
    color: var(--ink);
  }

  /* Entries the player didn't write */
  .notebook-entry.foreign .entry-body {
    color: var(--mauve);
    font-style: italic;
  }

  .notebook-entry.foreign .entry-time::after {
    content: ' — not yours';
    color: var(--mauve-soft);
  }

  .notebook-empty {
    color: var(--ink-faded);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
  }

  /* Endings */
  .ending {
    text-align: center;
    padding-top: 40px;
  }

  .ending .room-label {
    color: var(--mauve);
  }

  .ending .prose p {
    font-size: 19px;
    line-height: 1.85;
  }

  .ending .restart {
    margin-top: 60px;
    background: none;
    border: 1px solid var(--rule);
    padding: 12px 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 200ms ease;
    opacity: 0;
    animation: fadeIn 1000ms ease forwards;
    animation-delay: 4000ms;
  }

  .ending .restart:hover, .ending .restart:focus-visible {
    color: var(--ink);
    border-color: var(--ink-soft);
    outline: none;
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Title screen */
  .title-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px;
    text-align: center;
  }

  .title-screen h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 72px;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 96px;
    letter-spacing: 0.02em;
  }

  .title-screen .begin {
    background: none;
    border: 1px solid var(--ink-faded);
    padding: 16px 44px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 350ms ease;
  }

  .title-screen .begin:hover, .title-screen .begin:focus-visible {
    background: var(--mauve);
    border-color: var(--mauve);
    color: var(--paper);
    outline: none;
    letter-spacing: 0.36em;
  }

  @media (max-width: 600px) {
    .title-screen h1 { font-size: 52px; margin-bottom: 64px; }
    .stage { padding: 60px 22px 140px; }
    html, body { font-size: 18px; }
    .notebook-toggle { top: 16px; right: 16px; padding: 8px 12px; }
  }
</style>

<button class="inv-toggle" id="invToggle" aria-label="Open inventory" style="display:none;">
  Inventory<span class="count" id="invCount">0</span><span class="dot"></span>

</button>

<main id="root"></main>

<!-- Game modules, loaded in dependency order -->
<script>
/* ============================================================
   state.js
   Shared mutable game state. Loaded first.
   ============================================================ */

const state = {
  scene: 'title',
  act: 1,
  visited: {},          // roomName -> visit count
  affinity: { walter: 0, marta: 0, lena: 0, daniel: 0 },
  path: 0,              // negative = skeptical, positive = yielding
  notebook: [],         // { time, body, foreign? }
  inventory: [],        // array of item ids
  flags: {},
  notebookSeen: 0,
  invSeen: 0,
  currentRoom: null,    // tracks ambient layer
};

/* ============================================================
   AUDIO
   The drone is the room itself, the stings are moments of
   wrongness. Everything is synthesized — no external assets.
   ============================================================ */

const audio = {
  ctx: null,
  enabled: true,
  started: false,
  drone: null,
  droneAct: 0,
  ambient: null,
  ambientRoom: null,
  heartbeat: null,
  heartbeatTimer: null,
};

function initAudio() {
  if (audio.started) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audio.ctx = new AC();
    audio.started = true;
  } catch (e) {
    audio.started = false;
  }
}

function startDrone(act) {
  if (!audio.ctx || !audio.enabled) return;
  if (audio.drone) stopDrone();
  const ctx = audio.ctx;
  const now = ctx.currentTime;

  const master = ctx.createGain();
  master.gain.setValueAtTime(0.0001, now);
  master.connect(ctx.destination);

  // Three low sines, slightly detuned. Act III adds dissonance.
  const base = act === 1 ? 55 : act === 2 ? 58.27 : 62.5;
  const intervals = act === 3 ? [1, 1.494, 2.13] : [1, 1.5, 2.001];
  const oscs = intervals.map((mult, i) => {
    const o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.value = base * mult + i * 0.31;
    return o;
  });

  // Low-pass filter for warmth — slowly modulated by an LFO
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = act === 3 ? 620 : 420;
  filter.Q.value = 0.4;

  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = 0.06;
  lfoGain.gain.value = 65;
  lfo.connect(lfoGain);
  lfoGain.connect(filter.frequency);

  // Filtered noise as "room tone"
  const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
  const noiseData = noiseBuffer.getChannelData(0);
  for (let i = 0; i < noiseData.length; i++) noiseData[i] = (Math.random() - 0.5) * 0.5;
  const noise = ctx.createBufferSource();
  noise.buffer = noiseBuffer;
  noise.loop = true;
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'lowpass';
  noiseFilter.frequency.value = 220;
  const noiseGain = ctx.createGain();
  noiseGain.gain.value = 0.025;
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(master);

  oscs.forEach(o => o.connect(filter));
  filter.connect(master);

  oscs.forEach(o => o.start(now));
  lfo.start(now);
  noise.start(now);

  const target = act === 3 ? 0.06 : 0.04;
  master.gain.exponentialRampToValueAtTime(target, now + 5);

  audio.drone = { master, oscs, lfo, noise };
  audio.droneAct = act;

  // Start heartbeat on Act III
  if (act === 3) startHeartbeat();
  else stopHeartbeat();
}

function stopDrone() {
  if (!audio.drone || !audio.ctx) return;
  const ctx = audio.ctx;
  const now = ctx.currentTime;
  const d = audio.drone;
  audio.drone = null;
  try {
    d.master.gain.cancelScheduledValues(now);
    d.master.gain.setValueAtTime(d.master.gain.value, now);
    d.master.gain.exponentialRampToValueAtTime(0.00001, now + 2.5);
  } catch (e) {}
  setTimeout(() => {
    try {
      d.oscs.forEach(o => o.stop());
      d.lfo.stop();
      d.noise.stop();
    } catch (e) {}
  }, 3000);
}

function fadeOutDrone(duration) {
  if (!audio.drone || !audio.ctx) return;
  const ctx = audio.ctx;
  const now = ctx.currentTime;
  try {
    audio.drone.master.gain.cancelScheduledValues(now);
    audio.drone.master.gain.setValueAtTime(audio.drone.master.gain.value, now);
    audio.drone.master.gain.exponentialRampToValueAtTime(0.00001, now + duration);
  } catch (e) {}
  stopAmbient(duration);
  stopHeartbeat();
}

function transitionDrone(newAct) {
  if (!audio.ctx || !audio.enabled) return;
  stopDrone();
  setTimeout(() => startDrone(newAct), 2600);
}

/* -- Per-room ambient layers ------------------------------ */

function startAmbient(roomKind) {
  if (!audio.ctx || !audio.enabled) return;
  if (audio.ambientRoom === roomKind) return;
  stopAmbient(1.5);
  if (!roomKind) return;

  const ctx = audio.ctx;
  const now = ctx.currentTime;
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.0001, now);
  master.connect(ctx.destination);

  const nodes = { master, sources: [], timers: [] };

  if (roomKind === 'kitchen') {
    // Faint refrigerator hum
    const o = ctx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = 60;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 180;
    const g = ctx.createGain();
    g.gain.value = 0.06;
    o.connect(filt); filt.connect(g); g.connect(master);
    o.start(now);
    nodes.sources.push(o);
    master.gain.exponentialRampToValueAtTime(0.5, now + 3);
  }
  else if (roomKind === 'bathroom') {
    // Slow filtered noise modulated like breath, with rare wood creaks and
    // very faint high distant tones — the half-heard thing through the wall.

    // Base: low-pass-filtered noise as a "presence" layer
    const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 4, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() - 0.5);
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 280;
    filt.Q.value = 0.7;
    const breathGain = ctx.createGain();
    breathGain.gain.value = 0.35;

    // LFO at 0.16 Hz (~6s cycle) modulates the gain — slow inhale/exhale shape
    const breathLFO = ctx.createOscillator();
    const breathLFODepth = ctx.createGain();
    breathLFO.type = 'sine';
    breathLFO.frequency.value = 0.16;
    breathLFODepth.gain.value = 0.32;
    breathLFO.connect(breathLFODepth);
    breathLFODepth.connect(breathGain.gain);

    noise.connect(filt);
    filt.connect(breathGain);
    breathGain.connect(master);
    noise.start(now);
    breathLFO.start(now);
    nodes.sources.push(noise, breathLFO);

    // Rare wood creaks — a single descending pop, sparse and irregular
    const creak = setInterval(() => {
      if (!audio.ambient) return;
      if (Math.random() > 0.35) return;
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      o.type = 'triangle';
      o.frequency.setValueAtTime(140 + Math.random() * 80, t);
      o.frequency.exponentialRampToValueAtTime(55, t + 0.45);
      const cg = ctx.createGain();
      cg.gain.setValueAtTime(0.0001, t);
      cg.gain.linearRampToValueAtTime(0.028, t + 0.05);
      cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
      const cflt = ctx.createBiquadFilter();
      cflt.type = 'lowpass';
      cflt.frequency.value = 500;
      o.connect(cflt); cflt.connect(cg); cg.connect(master);
      o.start(t); o.stop(t + 0.9);
    }, 11000);
    nodes.timers.push(creak);

    // Faint distant high tone — the half-heard thing through the wall.
    // Very rare and very quiet; the player will notice it only by absence.
    const distant = setInterval(() => {
      if (!audio.ambient) return;
      if (Math.random() > 0.22) return;
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      o.type = 'sine';
      o.frequency.value = 1100 + Math.random() * 500;
      const dg = ctx.createGain();
      dg.gain.setValueAtTime(0.0001, t);
      dg.gain.linearRampToValueAtTime(0.014, t + 0.9);
      dg.gain.exponentialRampToValueAtTime(0.0001, t + 3.2);
      o.connect(dg); dg.connect(master);
      o.start(t); o.stop(t + 3.4);
    }, 17000);
    nodes.timers.push(distant);

    master.gain.exponentialRampToValueAtTime(1, now + 3);
  }
  else if (roomKind === 'basement') {
    // Deeper boiler hum + occasional pipe knock
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    o1.type = 'sine'; o1.frequency.value = 42;
    o2.type = 'sine'; o2.frequency.value = 84.3;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 200;
    const g = ctx.createGain();
    g.gain.value = 0.5;
    o1.connect(filt); o2.connect(filt); filt.connect(g); g.connect(master);
    o1.start(now); o2.start(now);
    nodes.sources.push(o1, o2);

    // Occasional pipe knock
    const knock = setInterval(() => {
      if (!audio.ambient) return;
      if (Math.random() > 0.35) return;
      const t = ctx.currentTime;
      const ko = ctx.createOscillator();
      ko.type = 'triangle';
      ko.frequency.setValueAtTime(180, t);
      ko.frequency.exponentialRampToValueAtTime(45, t + 0.12);
      const kg = ctx.createGain();
      kg.gain.setValueAtTime(0.0001, t);
      kg.gain.linearRampToValueAtTime(0.04, t + 0.01);
      kg.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
      ko.connect(kg); kg.connect(master);
      ko.start(t); ko.stop(t + 0.3);
    }, 8000);
    nodes.timers.push(knock);
    master.gain.exponentialRampToValueAtTime(0.5, now + 3);
  }
  else if (roomKind === 'attic') {
    // Wind through eaves: heavily filtered noise with slow modulation
    const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 3, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() - 0.5);
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 400;
    filt.Q.value = 1.5;
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = 0.12;
    lfoGain.gain.value = 200;
    lfo.connect(lfoGain);
    lfoGain.connect(filt.frequency);
    const g = ctx.createGain();
    g.gain.value = 0.4;
    noise.connect(filt); filt.connect(g); g.connect(master);
    noise.start(now); lfo.start(now);
    nodes.sources.push(noise, lfo);
    master.gain.exponentialRampToValueAtTime(1, now + 3);
  }

  audio.ambient = nodes;
  audio.ambientRoom = roomKind;
}

function stopAmbient(fade = 2) {
  if (!audio.ambient || !audio.ctx) return;
  const a = audio.ambient;
  const ctx = audio.ctx;
  const now = ctx.currentTime;
  audio.ambient = null;
  audio.ambientRoom = null;
  try {
    a.master.gain.cancelScheduledValues(now);
    a.master.gain.setValueAtTime(a.master.gain.value, now);
    a.master.gain.exponentialRampToValueAtTime(0.00001, now + fade);
  } catch (e) {}
  a.timers.forEach(t => clearInterval(t));
  setTimeout(() => {
    a.sources.forEach(s => { try { s.stop(); } catch (e) {} });
  }, fade * 1000 + 500);
}

/* -- Heartbeat (Act III only) ----------------------------- */

function startHeartbeat() {
  if (!audio.ctx || !audio.enabled || audio.heartbeatTimer) return;
  const ctx = audio.ctx;
  function thump() {
    if (!audio.enabled) return;
    const t = ctx.currentTime;
    const playOne = (offset) => {
      const o = ctx.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(80, t + offset);
      o.frequency.exponentialRampToValueAtTime(40, t + offset + 0.2);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t + offset);
      g.gain.linearRampToValueAtTime(0.07, t + offset + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + offset + 0.4);
      o.connect(g); g.connect(ctx.destination);
      o.start(t + offset); o.stop(t + offset + 0.5);
    };
    playOne(0);
    playOne(0.35);
  }
  thump();
  audio.heartbeatTimer = setInterval(thump, 4200);
  audio.heartbeat = true;
}

function stopHeartbeat() {
  if (audio.heartbeatTimer) clearInterval(audio.heartbeatTimer);
  audio.heartbeatTimer = null;
  audio.heartbeat = false;
}

function sting(type) {
  if (!audio.ctx || !audio.enabled) return;
  const ctx = audio.ctx;
  const now = ctx.currentTime;

  if (type === 'recognition') {
    const osc = ctx.createOscillator();
    const filt = ctx.createBiquadFilter();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 130.81;
    filt.type = 'lowpass';
    filt.frequency.value = 600;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.08, now + 0.12);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 4);
    osc.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 4.2);
  }
  else if (type === 'mirror') {
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const gain = ctx.createGain();
    o1.type = 'sine'; o2.type = 'sine';
    o1.frequency.value = 196;
    o2.frequency.value = 197.6;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.05, now + 0.2);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.5);
    o1.connect(gain); o2.connect(gain); gain.connect(ctx.destination);
    o1.start(now); o2.start(now);
    o1.stop(now + 3.7); o2.stop(now + 3.7);
  }
  else if (type === 'foreign') {
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const gain = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    o1.type = 'triangle'; o2.type = 'sine';
    o1.frequency.value = 87.3;
    o2.frequency.value = 138.6;
    filt.type = 'lowpass';
    filt.frequency.value = 900;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.07, now + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 6);
    o1.connect(filt); o2.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    o1.start(now); o2.start(now);
    o1.stop(now + 6.2); o2.stop(now + 6.2);
  }
  else if (type === 'discovery') {
    // Found an item: a warm pluck with a partial 5th above
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const gain = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    o1.type = 'sine'; o2.type = 'sine';
    o1.frequency.value = 261.6;  // C4
    o2.frequency.value = 392;    // G4
    filt.type = 'lowpass';
    filt.frequency.setValueAtTime(2000, now);
    filt.frequency.exponentialRampToValueAtTime(600, now + 1.5);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.06, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.5);
    o1.connect(filt); o2.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    o1.start(now); o2.start(now);
    o1.stop(now + 2.7); o2.stop(now + 2.7);
  }
  else if (type === 'revelation') {
    // Major story beat: deep, long, with a third voice rising
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const o3 = ctx.createOscillator();
    const gain = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    o1.type = 'sine';
    o2.type = 'sine';
    o3.type = 'sine';
    o1.frequency.value = 65.4;
    o2.frequency.value = 98.0;
    o3.frequency.setValueAtTime(130.8, now);
    o3.frequency.exponentialRampToValueAtTime(196, now + 4);
    filt.type = 'lowpass';
    filt.frequency.value = 1100;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.08, now + 0.4);
    gain.gain.linearRampToValueAtTime(0.08, now + 4);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 8);
    o1.connect(filt); o2.connect(filt); o3.connect(filt);
    filt.connect(gain); gain.connect(ctx.destination);
    o1.start(now); o2.start(now); o3.start(now);
    o1.stop(now + 8.2); o2.stop(now + 8.2); o3.stop(now + 8.2);
  }
  else if (type === 'paper') {
    // Inventory/notebook open: short noise burst, mid-filtered
    const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() - 0.5);
    const src = ctx.createBufferSource();
    src.buffer = noiseBuf;
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 2500;
    filt.Q.value = 0.8;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.04, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
    src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    src.start(now); src.stop(now + 0.4);
  }
}

function toggleAudio() {
  audio.enabled = !audio.enabled;
  if (audio.enabled) {
    initAudio();
    startDrone(state.act || 1);
    if (state.currentRoom) startAmbient(roomToAmbient(state.currentRoom));
    audioToggle.innerHTML = '<span class="sym">♪</span>on';
  } else {
    stopDrone();
    stopAmbient(0.5);
    stopHeartbeat();
    audioToggle.innerHTML = '<span class="sym">♪</span>off';
  }
}

function roomToAmbient(room) {
  if (!room) return null;
  if (room === 'kitchen') return 'kitchen';
  if (room === 'bathroom') return 'bathroom';
  if (room === 'basement') return 'basement';
  if (room === 'attic') return 'attic';
  return null;
}

/* ============================================================
   ui.js
   DOM hooks, notebook + inventory UI, the find-flash pulse.
   ============================================================ */

// DOM element references
const root = document.getElementById('root');
const notebookToggle = document.getElementById('notebookToggle');
const notebookPanel = document.getElementById('notebookPanel');
const notebookEntriesEl = document.getElementById('notebookEntries');
const notebookCloseBtn = document.getElementById('notebookClose');
const audioToggle = document.getElementById('audioToggle');
const invToggle = document.getElementById('invToggle');
const invPanel = document.getElementById('invPanel');
const invItemsEl = document.getElementById('invItems');
const invCloseBtn = document.getElementById('invClose');
const invCountEl = document.getElementById('invCount');

// Toggle button event listeners
notebookToggle.addEventListener('click', openNotebook);
notebookCloseBtn.addEventListener('click', closeNotebook);
audioToggle.addEventListener('click', toggleAudio);
invToggle.addEventListener('click', openInventory);
invCloseBtn.addEventListener('click', closeInventory);

/* -- Notebook -------------------------------------------- */

function openNotebook() {
  notebookPanel.classList.add('open');
  notebookPanel.setAttribute('aria-hidden', 'false');
  state.notebookSeen = state.notebook.length;
  notebookToggle.classList.remove('has-new');
  sting('paper');
}
function closeNotebook() {
  notebookPanel.classList.remove('open');
  notebookPanel.setAttribute('aria-hidden', 'true');
}

function addNote(body, foreign = false) {
  const time = formatTime(state.visited);
  state.notebook.push({ time, body, foreign });
  renderNotebook();
  if (state.notebook.length > state.notebookSeen) {
    notebookToggle.classList.add('has-new');
  }
  pulseToggle(notebookToggle);
}

function pulseToggle(el) {
  if (!el || el.style.display === 'none') return;
  el.classList.remove('flash');
  // Force reflow so the animation restarts even on rapid re-trigger
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 2500);
}

function formatTime(visited) {
  // Use total visit count as a soft timestamp
  const total = Object.values(visited).reduce((a,b)=>a+b, 0);
  if (total < 5) return 'late afternoon';
  if (total < 10) return 'evening';
  if (total < 16) return 'night';
  if (total < 22) return 'late night';
  return 'before dawn';
}

function renderNotebook() {
  if (state.notebook.length === 0) {
    notebookEntriesEl.innerHTML = '<p class="notebook-empty">Nothing yet.</p>';
    return;
  }
  notebookEntriesEl.innerHTML = state.notebook.map((e, i) => {
    const isNew = i >= state.notebookSeen;
    const cls = [
      'notebook-entry',
      e.foreign ? 'foreign' : '',
      isNew ? 'is-new' : '',
    ].filter(Boolean).join(' ');
    return `
      <div class="${cls}">
        <span class="entry-time">${e.time}</span>
        <div class="entry-body">${e.body}</div>
      </div>
    `;
  }).join('');
}

/* -- Inventory ------------------------------------------- */

function addItem(id) {
  if (state.inventory.includes(id)) return;
  state.inventory.push(id);
  renderInventory();
  invToggle.style.display = '';
  invToggle.classList.add('has-new');
  pulseToggle(invToggle);
}

function hasItem(id) { return state.inventory.includes(id); }

function hasAllPhotos() {
  return hasItem('photo_w') && hasItem('photo_m') && hasItem('photo_l') && hasItem('photo_d');
}

function openInventory() {
  invPanel.classList.add('open');
  invPanel.setAttribute('aria-hidden', 'false');
  state.invSeen = state.inventory.length;
  invToggle.classList.remove('has-new');
  sting('paper');
}
function closeInventory() {
  invPanel.classList.remove('open');
  invPanel.setAttribute('aria-hidden', 'true');
}

function renderInventory() {
  invCountEl.textContent = state.inventory.length;
  if (state.inventory.length === 0) {
    invItemsEl.innerHTML = '<p class="inv-empty">Nothing yet.</p>';
    return;
  }
  invItemsEl.innerHTML = state.inventory.map((id, i) => {
    const it = items[id];
    if (!it) return '';
    const isNew = i >= state.invSeen;
    return `
      <div class="inv-item ${isNew ? 'is-new' : ''}">
        <span class="inv-item-name">${it.name}</span>
        <div class="inv-item-desc">${it.desc}</div>
      </div>
    `;
  }).join('');
}

/* -- Keyboard + outside-click closing -------------------- */

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (notebookPanel.classList.contains('open')) closeNotebook();
    if (invPanel.classList.contains('open')) closeInventory();
  }
});

document.addEventListener('click', (e) => {
  // The audio toggle is a small corner control — clicking it shouldn't dismiss an open panel.
  if (audioToggle.contains(e.target)) return;
  // Notebook: close if click is outside the panel and not on its toggle
  if (notebookPanel.classList.contains('open') &&
      !notebookPanel.contains(e.target) &&
      !notebookToggle.contains(e.target)) {
    closeNotebook();
  }
  if (invPanel.classList.contains('open') &&
      !invPanel.contains(e.target) &&
      !invToggle.contains(e.target)) {
    closeInventory();
  }
});

/* ============================================================
   engine.js
   Core engine: applying effects, picking variants, rendering
   scenes, navigating between them.
   ============================================================ */

/* -- Helpers -------------------------------------------------- */

function pickRoomVariant(room) {
  const count = state.visited[room] || 0;
  return count;
}

function visit(room) {
  state.visited[room] = (state.visited[room] || 0) + 1;
}

function applyEffects(effects) {
  if (!effects) return;
  if (effects.affinity) {
    for (const [k, v] of Object.entries(effects.affinity)) {
      state.affinity[k] = (state.affinity[k] || 0) + v;
    }
  }
  if (typeof effects.path === 'number') state.path += effects.path;
  if (effects.flag) state.flags[effects.flag] = true;
  if (effects.act) state.act = effects.act;
  if (effects.note) addNote(effects.note, effects.foreign || false);
  if (effects.item) {
    const itemList = Array.isArray(effects.item) ? effects.item : [effects.item];
    const beforeCount = state.inventory.length;
    itemList.forEach(addItem);
    if (state.inventory.length > beforeCount && !effects.silentItem) sting('discovery');
  }
  if (effects.sting) sting(effects.sting);
}

function dominantInhabitant() {
  const entries = Object.entries(state.affinity);
  entries.sort((a, b) => b[1] - a[1]);
  if (entries[0][1] === 0) return null;
  return entries[0][0];
}

/* -- Progress check (Act II → III, attic_open flag) -----------
   Runs on every scene transition so the trigger fires no matter
   where the player is wandering, not only when they happen to
   visit the upstairs hall. */

function checkProgress() {
  if (state.act !== 2) return;
  const total = Object.values(state.visited).reduce((a, b) => a + b, 0);
  const dom = dominantInhabitant();
  const domVal = dom ? state.affinity[dom] : 0;
  // Lowered thresholds so a normal first-time playthrough reliably
  // hits Act III before getting stuck.
  if (total >= 10 || domVal >= 4) {
    state.act = 3;
    state.flags.attic_open = true;
  }
}

/* -- Renderer ------------------------------------------------- */

function render(sceneObj) {
  checkProgress();
  const text = (typeof sceneObj.text === 'function') ? sceneObj.text(state) : sceneObj.text;
  const choices = (typeof sceneObj.choices === 'function') ? sceneObj.choices(state) : sceneObj.choices;
  const label = (typeof sceneObj.label === 'function') ? sceneObj.label(state) : sceneObj.label;

  const labelHTML = label
    ? `<div class="room-label"><span class="act">Act ${roman(state.act)}</span>${label}</div>`
    : '';

  const proseHTML = text.map(p => `<p>${p}</p>`).join('');

  const choicesHTML = (choices || []).map((c, i) => `
    <button class="choice" data-i="${i}">${c.label}</button>
  `).join('');

  const wrapClass = sceneObj.ending ? 'stage ending' : 'stage';
  const endingTail = sceneObj.ending
    ? `<button class="restart" id="restartBtn">Begin again</button>`
    : '';

  root.innerHTML = `
    <div class="${wrapClass}">
      ${labelHTML}
      <div class="prose">${proseHTML}</div>
      ${sceneObj.ending ? '' : `<div class="choices">${choicesHTML}</div>`}
      ${endingTail}
    </div>
  `;

  if (sceneObj.ending) {
    document.getElementById('restartBtn').addEventListener('click', () => {
      resetGame();
    });
    return;
  }

  root.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i, 10);
      const choice = choices[i];
      applyEffects(choice.effects);
      go(choice.next);
    });
  });

  // Show notebook toggle once it has anything (or once Act II starts)
  if (state.notebook.length > 0 || state.act >= 2) {
    notebookToggle.style.display = '';
  }

  // Track current room (for ambient handling)
  if (sceneObj.room) state.currentRoom = sceneObj.room;

  // Audio: transition drone when act changes, fade out for endings,
  // and update room ambient layer when room changes.
  if (audio.started && audio.enabled) {
    if (sceneObj.ending) {
      fadeOutDrone(7);
    } else {
      if (audio.droneAct !== state.act) {
        transitionDrone(state.act);
      }
      if (sceneObj.room) {
        startAmbient(roomToAmbient(sceneObj.room));
      }
    }
  }
}

function roman(n) { return ['I','II','III','IV','V'][n-1] || n; }

function go(sceneName) {
  if (typeof sceneName === 'function') sceneName = sceneName(state);
  const next = scenes[sceneName];
  if (!next) {
    console.error('Missing scene:', sceneName);
    return;
  }
  if (next.room) visit(next.room);
  render(next);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetGame() {
  state.scene = 'title';
  state.act = 1;
  state.visited = {};
  state.affinity = { walter: 0, marta: 0, lena: 0, daniel: 0 };
  state.path = 0;
  state.notebook = [];
  state.inventory = [];
  state.flags = {};
  state.notebookSeen = 0;
  state.invSeen = 0;
  state.currentRoom = null;
  notebookToggle.classList.remove('has-new');
  notebookToggle.style.display = 'none';
  invToggle.classList.remove('has-new');
  invToggle.style.display = 'none';
  invCountEl.textContent = '0';
  audioToggle.style.display = 'none';
  stopDrone();
  stopAmbient(0.4);
  stopHeartbeat();
  audio.droneAct = 0;
  closeNotebook();
  closeInventory();
  renderNotebook();
  renderInventory();
  renderTitle();
}

     walkthrough), so we route ground floor → upstairs → back down → basement →
     act break. Once act = 2, the same room scenes serve up shifted variants. */

  living_room_continue: {
    label: 'Living Room',
    text: ["You return to the hall."],
    choices: [
      { label: "Continue.", next: 'kitchen' },
    ],
  },

  /* ---- ATTIC (Act III) -------------------------------- */

  attic: {
    label: 'Attic',
    room: 'attic',
    text: (s) => {
      const dom = dominantInhabitant();
      const base = [
        "The attic stairs come down out of the ceiling in pieces, smoothly, as if someone has used them recently. You go up.",
        "The attic is one long low room under the roof, and you have to stoop. It smells of dry wood. The single small window at the far end shows a sky that is either the end of one day or the beginning of another.",
      ];
      if (dom === 'walter') return base.concat([
        "The attic is laid out like a room of his. A folded chair. A tin of butterscotch. A notebook on the floor by the chair, the page open, a pencil resting in the fold. The page is dated today, and the page is waiting for something.",
      ]);
      if (dom === 'marta') return base.concat([
        "Someone has been unpacking up here. A box has been pulled open and its contents — paperbacks, a yellow scarf, a child's drawing — laid out on the boards in the careful way of someone deciding what to keep.",
        "The scarf is in your size.",
      ]);
      if (dom === 'lena') return base.concat([
        "There is a hiding place behind the chimney brick. You see it before you see the chimney. A gap, just wide enough.",
      ]);
      if (dom === 'daniel') return base.concat([
        "There is a desk up here you have never seen before. The chair is pulled out as if someone just stood up. The papers on the desk are recent.",
        "The lamp is on. The angle of light is one you recognize.",
      ]);
      return base.concat([
        "The attic is empty. It is the only room in the house that has ever been empty.",
      ]);
    },
    choices: (s) => {
      const dom = dominantInhabitant();
      const opts = [];

      // The photographs override path: if you have all four, the offer is here.
      if (hasAllPhotos()) {
        opts.push({ label: "Take out the four photographs.", next: 'photo_assembly', effects: { sting: 'revelation' } });
      }

      if (dom === 'walter') {
        opts.push({ label: "Sit down in the chair and pick up the pencil.", next: 'ending_walter' });
      } else if (dom === 'marta') {
        opts.push({ label: "Begin packing the box back up.", next: 'ending_marta' });
      } else if (dom === 'lena') {
        opts.push({ label: "Crawl into the hiding place.", next: 'ending_lena' });
      } else if (dom === 'daniel') {
        opts.push({ label: "Sit down at the desk.", next: 'ending_daniel' });
      }

      opts.push({ label: "Go back down.", next: dom ? 'leave_intent' : 'ending_fifth', effects: { flag: 'attempted_leave' } });
      return opts;
    },
  },

  photo_assembly: {
    label: 'Attic',
    text: [
      "You take the four photographs from your inside pocket and lay them on the bare floor of the attic, in the order in which you found them. Walter and his sister, before. Marta at her kitchen window, smoking, laughing at someone. Lena, told to smile and not smiling. Daniel at his desk in October light, photographed without his knowledge.",
      "You arrange them. You rearrange them. None of the orders feel right. None of them feel wrong.",
      "Looking at them in sequence, you notice that the four people are looking at you with the same expression. Or that you are looking at four photographs of yourself, at different ages, in different rooms, doing different things. You cannot decide which is true, and after a while you stop trying.",
      "The attic is no longer empty. It has these four photographs in it, and you, and a particular slant of light that is the light of every room in this house at the same time of day.",
    ],
    choices: [
      { label: "Stay where you are.", next: 'ending_true' },
    ],
  },

  leave_intent: {
    label: 'Upstairs Hall',
    text: (s) => {
      const dom = dominantInhabitant();
      if (!dom) return [
        "You go back down. The hall is the hall. The stairs are the stairs. You go to the front door. You open it.",
        "The outside is outside. Your car is where you left it. The road is the road.",
        "You stand in the doorway a long moment. You think — and the thinking is yours — that you do not have to go back in.",
      ];
      return [
        "You go back down. You mean to leave. You walk to the front door. You put your hand on the knob.",
        "You stand there a moment.",
      ];
    },
    choices: (s) => {
      const dom = dominantInhabitant();
      if (!dom) return [
        { label: "Walk to the car.", next: 'ending_fifth' },
      ];
      // Forced to commit: going back up triggers the ending tied to dom
      const dest = 'ending_' + dom;
      return [
        { label: "Open the door and leave.", next: 'ending_fifth' },
        { label: "Go back up the stairs.", next: dest },
      ];
    },
  },

  /* ---- ENDINGS ---------------------------------------- */

  ending_walter: {
    label: 'An Ending',
    ending: true,
    text: [
      "You sit. The chair is the right shape for you. The pencil is the right weight.",
      "You open the notebook to the empty page. The page wants a date and a name and an arrival time. You write the date. You write a name — not yours, exactly, but the one you have just decided to use here.",
      "The space for departure you leave empty. It feels correct to leave it empty.",
      "Downstairs, in the hall drawer, the visitor's book updates itself in the same hand.",
      "You begin labelling the drawers in the morning.",
    ],
  },

  ending_marta: {
    label: 'An Ending',
    ending: true,
    text: [
      "You pack the box back up neatly. You carry it downstairs and out to the car. You take only what fits.",
      "You drive into town in the morning and meet the lawyer and sign the papers to put the house on the market. The light on the way out feels different than the light on the way in. You are not certain whose relief you are feeling.",
      "You sell. You move south. You live a long time.",
      "Sometimes you wake at three in the morning and think about a yellow bathroom you have never seen, and a radio dial set between two stations, and the smell of a particular brand of cigarette that you have never smoked.",
      "These things do not trouble you. They are someone else's, and you are grateful to be carrying them lightly.",
    ],
  },

  ending_lena: {
    label: 'An Ending',
    ending: true,
    text: [
      "You crawl into the gap behind the chimney brick. You fit, just.",
      "It is darker than you expected, and warmer. Your shoulders find the shape of the place. Your knees come up under your chin without being asked.",
      "You can hear, from a long way off, footsteps on the stair, and the careful way someone comes up to this room when they are looking for you.",
      "You stay very still. He goes past the door.",
      "You stay a little longer, to be sure.",
    ],
  },

  ending_daniel: {
    label: 'An Ending',
    ending: true,
    text: [
      "You sit down at the desk. The chair takes your weight in the shape it has been waiting for.",
      "The papers in front of you are a project that has been going for a long time, and you find that you know what comes next. You pick up the pen.",
      "You work into the evening. You work into the night. You forget to eat. You forget to call the friend who has been meaning to check on you.",
      "Eventually you do not get up from the chair.",
      "No one notices for some time.",
    ],
  },

  ending_fifth: {
    label: 'An Ending',
    ending: true,
    text: [
      "You walk to the front door. You open it. You step out onto the porch and pull the door closed behind you.",
      "The car is where you left it. The road is the road. You get in. You sit a moment with the key in your hand.",
      "On the passenger seat there is a letter you do not remember leaving there. The envelope is addressed to a name that is not yours, in handwriting that is.",
      "Inside, in your own handwriting: <em>the house was left to you in full. There are no other beneficiaries. It is suggested that you visit.</em>",
      "You put the key in the ignition. You sit a little longer.",
      "The house behind you is empty in a way it has not been before.",
    ],
  },

  ending_true: {
    label: 'An Ending',
    ending: true,
    text: [
      "You sit down on the attic boards with the four photographs in front of you and find that you do not get up.",
      "The house is quiet around you. It is not waiting. It is not watching. It is present, the way a body is present, the way a memory is present once it has settled.",
      "Downstairs, the visitor's notebook on the hall table updates itself in the same careful hand. Today's date. A name that is not quite yours and is. Arrival time recorded. The space for departure has been left empty.",
      "In a town to the south, an old woman who was once Marta wakes from a dream of yellow paint and feels, for a moment, no fear of it. In a school photograph kept in a desk drawer in a city she never returned to, a girl who was once Lena is smiling, very faintly, for the first time. The cushion in the living room remembers two shapes now, evenly weighted. The notebook in the kitchen drawer has a new entry, in the same careful block hand, dated tomorrow.",
      "You stay. You are also gone. There is no difference here.",
    ],
  },

  /* ---- ROUTING AID: at end of Act I, send the player to act_break.
     We hook this from the basement go-back-up in Act I, and from any
     "all rooms visited" check could be added; for now the basement is
     the natural deepest point.  ---- */

};

/* ---------- Scene routing tweaks for Act I → Act II ----------
   We override two scenes' choice destinations so that returning from the
   basement at the end of Act I triggers act_break. */

const _origBasementChoices = scenes.basement.choices;
scenes.basement.choices = function(s) {
  const base = _origBasementChoices(s);
  if (s.act === 1 && (s.visited.basement || 0) >= 1) {
    return base.map(c => {
      if (c.label === 'Go back up.') {
        return Object.assign({}, c, { next: 'act_break' });
      }
      return c;
    });
  }
  return base;
};

/* The upstairs override is no longer needed for the Act III trigger
   — render() handles it globally now. Kept here as a stub in case
   we want to add upstairs-specific logic later. */

/* ============================================================
   TITLE SCREEN
   ============================================================ */

function renderTitle() {
  root.innerHTML = `
    <div class="title-screen">
      <h1>Tenancy</h1>
      <button class="begin" id="beginBtn">Begin</button>
    </div>
  `;
  document.getElementById('beginBtn').addEventListener('click', () => {
    initAudio();
    if (audio.enabled) startDrone(1);
    audioToggle.style.display = '';
    go('opening');
  });
}

renderTitle();

</script>
</body>
</html>
